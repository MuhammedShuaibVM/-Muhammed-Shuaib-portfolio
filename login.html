<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Muhammed Shuaib V.M</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        
        <div class="login-box">
            <div class="login-header">
                <a href="index.html" class="logo">MS.<span>dev</span></a>
                <h2>Welcome Back</h2>
                <p>Please sign in to continue</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div id="errorMessage" class="error-message"></div>
                
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="e.g. Shuaibmuhammed12345@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Any password works for demo" required>
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">Sign In <i class="fas fa-sign-in-alt"></i></button>
            </form>
            
            <div class="login-footer">
                <p>Demo Credentials: <span>Shuaibmuhammed12345@gmail.com</span></p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
